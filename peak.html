<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE PEAK - Loading...</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #000;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* Video stays hidden until it's ready, 10px gap on all sides */
        #peak-video {
            position: fixed;
            top: 10px; left: 10px; right: 10px; bottom: 10px;
            width: calc(100% - 20px); height: calc(100% - 20px);
            object-fit: cover;
            opacity: 0;
            transition: opacity 2s ease-in;
        }

        /* LOADING SCREEN */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            background: #000;
        }

        .loader-text {
            font-size: 1.5rem;
            letter-spacing: 5px;
            margin-bottom: 20px;
            color: #00d2ff; /* Gojo Blue */
            text-shadow: 0 0 10px #00d2ff;
        }

        .progress-bar {
            width: 300px;
            height: 2px;
            background: #333;
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: #ff004c; /* Sukuna Red */
            box-shadow: 0 0 10px #ff004c;
            transition: width 0.2s;
        }

        #back-btn {
            position: fixed; top: 30px; left: 30px; z-index: 100;
            background: rgba(255,255,255,0.1); color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px; cursor: pointer;
            text-decoration: none;
            backdrop-filter: blur(5px);
        }

        #unmute-btn {
            display: none;
            position: fixed; top: 30px; right: 30px; z-index: 100;
            background: rgba(255,255,255,0.1); color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px; cursor: pointer;
            backdrop-filter: blur(5px);
        }

    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-text">SUMMONING... <span id="percent">0%</span></div>
        <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>
    </div>

    <a id="back-btn" href="index.html?nointro=1">BACK</a>
    <button id="unmute-btn" onclick="enableAudio()">UNMUTE</button>

    <video id="peak-video" muted loop playsinline preload="auto">
        <source src="assets/videos/peak.mp4" type="video/mp4">
    </video>

    <script>
        const video = document.getElementById('peak-video');
        const loader = document.getElementById('loader');
        const percentText = document.getElementById('percent');
        const bar = document.getElementById('bar');
        const btn = document.getElementById('unmute-btn');

        // Monitor Download Progress
        video.addEventListener('progress', () => {
            if (video.buffered.length > 0) {
                const duration = video.duration;
                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                
                // Calculate percentage (approximate)
                if (duration > 0) {
                    const percent = Math.min(100, Math.round((bufferedEnd / duration) * 100));
                    percentText.innerText = percent + "%";
                    bar.style.width = percent + "%";
                }
            }
        });

        // Monitor if it's actually ready to play
        video.addEventListener('canplaythrough', () => {
            // Hide Loader
            loader.style.display = 'none';
            // Show Video
            video.style.opacity = '1';
            video.play();
            // Show Unmute Button
            btn.style.display = 'block';
        });

        // Basic Play fallback
        video.addEventListener('canplay', () => {
            video.play();
            loader.style.display = 'none';
            video.style.opacity = '1';
            btn.style.display = 'block';
        });

        function enableAudio() {
            video.muted = false;
            btn.style.display = 'none';
        }
        
        // Error Handler
        video.onerror = () => {
            percentText.innerText = "ERROR";
            percentText.style.color = "red";
            alert("Video failed. Ensure file is 'fight.mp4' in 'assets/video/'");
        }
    </script>
</body>
</html>
